description = "Atlas Automation Hub is a task scheduling tool for moving data."
keywords = [
  "Atlas Automation Hub",
  "flask-apscheduler",
  "flask",
  "apscheduler",
  "scheduling"
]
license = "GPL-3.0-or-later"
maintainers = [{name = "Christopher Pickering", email = "cpickering@rhc.net"}]
name = "atlas-hub"
readme = "readme.md"
requires-python = ">=3.10,<4.0"
version = "2.12.13"

[project.urls]
Documentation = "https://www.atlas.bi/docs/hub/"
Homepage = "https://atlas-hub.atlas.bi"
Repository = "https://github.com/atlas-bi/Hub"

[tool]

[tool.black]
exclude = '''
    /(
        \.git
      | \.hg
      | \.mypy_cache
      | \.tox
      | \.venv
      | _build
      | buck-out
      | build
      | dist

      # The following are specific to Black, you probably don't want those.
      | blib2to3
      | tests/data

      # em2
      | migrations
      | migrations_dev
      | temp
      | node_modules
    )/
    '''
line-length = 99

[tool.djlint]
blank_line_after_tag = "load,extends,include,endblock"
format_attribute_template_tags = true
ignore = "H011,H021,H023,H031"
profile = "jinja"

[tool.hatch.build]
exclude = [
  "/.git",
  "/.github",
  "/.mypy_cache",
  "/.poetry-cache",
  "/.tox",
  "/.venv",
  "/.venvs",
  "/node_modules",
  "/temp"
]

[tool.hatch.build.targets.wheel]
packages = ["web", "scheduler", "runner"]

[tool.isort]
profile = "black"
sections = "FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER"
skip_glob = ["runner/temp/*"]

[tool.mypy]
disable_error_code = "attr-defined, name-defined"
disallow_untyped_calls = true
disallow_untyped_defs = true
exclude = "/(temp|tests)/$"
ignore_missing_imports = true

[[tool.mypy.overrides]]
ignore_errors = true
module = "*.smb_fix"

[[tool.mypy.overrides]]
ignore_errors = true
module = "*.ldap_auth"

[tool.poetry]
package-mode = false

[tool.pytest]

[tool.pytest.ini_options]
addopts = "-rsx --tb=short"
filterwarnings = "always"
testpaths = "tests"

[tool.ruff]
extend-exclude = ['test*', 'ldap_auth*']
ignore = ['RUF015', 'B034', 'PLR1714', 'S602', 'S605', 'D213', 'S324', 'D203', 'S301', 'N818', 'PLW0120', 'PLR0915', 'S110', 'S101', 'C417', 'PLR0913', 'D212', 'RUF100', 'B020', 'S106', 'PLC1901', 'PLR0911', 'F401', "E501", 'SIM118', 'PLR2004', 'PLW2901', 'B905', 'E402', 'PLR0912', 'B904', 'ERA001', 'PLR5501', 'D401', 'SIM108']
select = ['F', 'E', 'W', 'N', 'D', 'S', 'B', 'C4', 'T20', 'Q', 'SIM', 'ERA', 'PL', 'RUF']

[tool.ruff.per-file-ignores]
"runner/scripts/em_python.py" = ['SIM114']

[tool.setuptools_scm]
local_scheme = "dirty-tag"
version_scheme = "post-release"

[tool.uv]
default-groups = ["dev"]

[tool.uv.extra-build-dependencies]
htmlmin = ["legacy-cgi>=2.6.4; python_version >= '3.13'"]

[tool.uv.sources]
flask-assets = {git = "https://github.com/christopherpickering/flask-assets.git"}
