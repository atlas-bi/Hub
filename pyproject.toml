  "coverage>=7.0.0,<8.0.0",
  "djlint>=1.19.17,<2.0.0",
  "flask-debugtoolbar>=0.16.0,<0.17.0",
  "isort>=5.10.1,<6.0.0",
  "mypy==0.991",
  "pre-commit>=3.0.0,<4.0.0",
  "pytest>=8.0.0,<9.0.0",
  "pytest-cov>=4.0.0,<5.0.0",
  "radon>=6.0.0,<7.0.0",
  "ruff>=0.1.0,<0.2.0",
  "toml>=0.10.2,<0.11.0",
  "tox>=4.0.8,<5.0.0",
  "tox-uv>=1.0.0,<2.0.0",
  "types-flask>=1.1.6,<2.0.0",
  "types-jinja2>=2.11.9,<3.0.0",
