  "redis>=5.0.0,<6.0.0",
  "regex>=2024.11.6,<2027.0.0",
  "relative-to-now>=1.0.0,<2.0.0",
  "requests>=2.26.0,<3.0.0",
  "setuptools>=80.10.2,<80.11.0",
