  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
  "Operating System :: OS Independent",
  "Development Status :: 5 - Production/Stable",
  "Framework :: Flask",
  "Intended Audience :: Healthcare Industry",
  "Natural Language :: English"
]
dependencies = [
  "Flask>=2.0.1,<3.0.0",
  "Flask-APScheduler>=1.12.2,<2.0.0",
  "Flask-Assets>=2.0,<3.0",
  "Flask-Caching>=2.0.0,<3.0.0",
  "Flask-Compress==1.24",
  "Flask-Executor>=1.0.0,<2.0.0",
  "Flask-HTMLmin>=2.1.0,<3.0.0",
  "Flask-Login>=0.6.0,<0.7.0",
  "Flask-WTF>=1.2.0,<2.0.0",
  "Flask-Migrate>=4.0.0,<5.0.0",
  "Flask-SQLAlchemy>=3.1.1,<4.0.0",
  "Flask-Script>=2.0.6,<3.0.0",
  "Jinja2>=3.0.1,<4.0.0",
  "SQLAlchemy>=2.0.20,<3.0.0",
  "SQLAlchemy-Utils>=0.41.0,<0.42.0",
  "azure-devops>=7.1.0b3,<8.0.0",
  "bs4>=0.0.2,<0.0.3",
  "cffi>=2.0.0,<3.0.0",
  "cryptography>=43.0.0,<44.0.0",
  "flask-assets",
  "flask-redis>=0.4.0,<0.5.0",
  "flask-session2>=1.2.0,<2.0.0",
  "gevent>=23.9.1,<26",
  "gunicorn>=25.3.0,<25.4.0",
  "is-safe-url>=1.0,<2.0",
  "jaydebeapi>=1.2.3,<2.0.0",
  "jpype1>=1.5.1,<2.0.0",
  "legacy-cgi>=2.6.4; python_version >= '3.13'",
  "paramiko>=3.0.0,<4.0.0",
  "pathvalidate>=3.0.0,<4.0.0",
  "psutil>=5.8.0,<6.0.0",
  "psycopg2-binary>=2.9.11,<3.0.0",
  "pyodbc>=5.3.0,<6.0.0",
  "pysaml2>=7.0.1,<8.0.0",
  "pysmb>=1.2.7,<2.0.0",
  "python-dateutil>=2.8.2,<3.0.0",
  "python-gnupg>=0.5.0,<0.6.0",
