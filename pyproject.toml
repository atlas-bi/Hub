  {name = "Darrel Drake"},
  {name = "Dee Anna Hillebrand"},
  {name = "Scott Manley"},
  {name = "Madeline Matz"},
  {name = "Christopher Pickering", email = "cpickering@rhc.net"},
  {name = "Dan Ryan"},
  {name = "Richard Schissler"},
  {name = "Eric Shultz"}
]
